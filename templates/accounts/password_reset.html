{% extends 'base.html' %}
{% block title %}Restablecer contraseña — Albeitar{% endblock %}

{% block auth_content %}
<div class="card shadow-sm">
  <div class="card-body p-4">
    <h5 class="fw-bold mb-1">Restablecer contraseña</h5>
    <p class="text-muted small mb-4">Te enviaremos un enlace a tu correo registrado.</p>
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">{{ form.email.label }}</label>
        {{ form.email }}
      </div>
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary">Enviar enlace</button>
      </div>
      <div class="text-center">
        <a href="{% url 'accounts:login' %}" class="text-muted small">Volver al inicio de sesión</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
