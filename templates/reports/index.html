{% extends 'base.html' %}
{% block title %}Reportes — VetClinic{% endblock %}
{% block content %}
<h4 class="fw-bold mb-4"><i class="bi bi-file-earmark-text me-2"></i>Reportes</h4>
<div class="row g-3">
  <div class="col-md-4">
    <div class="card text-center p-4">
      <i class="bi bi-shield-check text-success" style="font-size:2rem;"></i>
      <h6 class="mt-2 fw-semibold">Certificado de vacunación</h6>
      <p class="text-muted small">Disponible en Fase 6</p>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card text-center p-4">
      <i class="bi bi-file-earmark-medical text-primary" style="font-size:2rem;"></i>
      <h6 class="mt-2 fw-semibold">Historia clínica</h6>
      <p class="text-muted small">Disponible en Fase 6</p>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card text-center p-4">
      <i class="bi bi-clipboard-prescription text-warning" style="font-size:2rem;"></i>
      <h6 class="mt-2 fw-semibold">Receta imprimible</h6>
      <p class="text-muted small">Disponible en Fase 6</p>
    </div>
  </div>
</div>
{% endblock %}
