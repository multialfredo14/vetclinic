{% extends 'base.html' %}
{% block title %}Cancelar cita — VetClinic{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;">
  <div class="card-body p-4 text-center">
    <i class="bi bi-x-circle text-danger" style="font-size:2.5rem;"></i>
    <h5 class="fw-bold mt-3">¿Cancelar esta cita?</h5>
    <p class="text-muted">
      <strong>{{ appointment.patient }}</strong> —
      {{ appointment.scheduled_at|date:"d/m/Y H:i" }}
    </p>
    <form method="post" class="d-flex gap-2 justify-content-center">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Sí, cancelar</button>
      <a href="{% url 'appointments:appointment_detail' appointment.pk %}" class="btn btn-outline-secondary">Volver</a>
    </form>
  </div>
</div>
{% endblock %}
