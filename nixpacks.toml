# Nixpacks build configuration for Railway
# WeasyPrint requires Cairo, Pango and GDK-PixBuf system libraries.

[variables]
DJANGO_SETTINGS_MODULE = "vetclinic.settings.prod"

[phases.setup]
nixPkgs = [
  "cairo",
  "pango",
  "gdk-pixbuf",
  "libffi",
  "gobject-introspection",
]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[start]
cmd = "python manage.py migrate --noinput && gunicorn vetclinic.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
