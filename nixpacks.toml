# Nixpacks build configuration for Railway
# WeasyPrint requires Cairo, Pango and GDK-PixBuf system libraries.

[variables]
DJANGO_SETTINGS_MODULE = "vetclinic.settings.prod"
# SECRET_KEY placeholder — Railway lo sobreescribe en runtime con el valor real
SECRET_KEY = "django-build-placeholder-change-in-railway-variables"
# DATABASE_URL lo inyecta Railway automáticamente desde el servicio PostgreSQL.
# No se define aquí para que Railway tenga control total del valor.

[phases.setup]
nixPkgs = [
  "cairo",
  "pango",
  "gdk-pixbuf",
  "libffi",
  "gobject-introspection",
]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[start]
cmd = "python manage.py migrate --noinput && gunicorn vetclinic.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
