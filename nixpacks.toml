# Nixpacks build configuration for Railway
# WeasyPrint requires Cairo, Pango and GDK-PixBuf system libraries.

[variables]
DJANGO_SETTINGS_MODULE = "vetclinic.settings.prod"
# SECRET_KEY placeholder — Railway lo sobreescribe con el valor real en runtime.
SECRET_KEY = "django-build-placeholder-change-in-railway-variables"

[phases.setup]
nixPkgs = [
  "cairo",
  "pango",
  "gdk-pixbuf",
  "libffi",
  "gobject-introspection",
]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
  "chmod +x startup.sh",
  "python manage.py collectstatic --noinput",
]

[start]
cmd = "bash startup.sh"
